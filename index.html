<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 WakeTune</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:"Yu Gothic","Meiryo",sans-serif;

    background:linear-gradient(135deg,#0F172A,#1E293B);

    color:#F8FAFC;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:30px;

}

.container{

    width:100%;

    max-width:500px;

}

.card{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.12);

    border-radius:25px;

    padding:35px;

    box-shadow:0 20px 40px rgba(0,0,0,.35);

}

.logo{

    text-align:center;

    margin-bottom:35px;

}

.logo h1{

    font-size:38px;

    color:#38BDF8;

}

.logo p{

    margin-top:8px;

    color:#CBD5E1;

    font-size:15px;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

}

input[type=time]{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    margin-bottom:25px;

    font-size:18px;

}

input[type=file]{

    width:100%;

    margin-bottom:30px;

}

.buttons{

    display:flex;

    gap:12px;

}

button{

    flex:1;

    padding:15px;

    border:none;

    border-radius:12px;

    font-size:17px;

    cursor:pointer;

    transition:.25s;

}

#startBtn{

    background:#38BDF8;

    color:white;

}

#startBtn:hover{

    background:#0EA5E9;

    transform:translateY(-2px);

}

#stopBtn{

    background:#334155;

    color:white;

}

#stopBtn:hover{

    background:#475569;

}

button:disabled{

    opacity:.5;

    cursor:not-allowed;

}

#selectMusicBtn{

    width:100%;

    background:#2563EB;

    color:white;

    margin-bottom:15px;

}

#selectMusicBtn:hover{

    background:#1D4ED8;

}

#musicName{

    text-align:center;

    color:#CBD5E1;

    margin-bottom:25px;

    font-size:15px;

}

#status{


　  margin-top:25px;

    text-align:center;

    font-size:17px;

    padding:12px;

    border-radius:12px;

    background:rgba(56,189,248,.15);

    color:#7DD3FC;


}

#welcome{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.75);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:999;

}

.welcomeBox{

    width:90%;

    max-width:500px;

    background:#1E293B;

    border-radius:25px;

    padding:35px;

    position:relative;

}

.close{

    position:absolute;

    right:20px;

    top:15px;

    font-size:30px;

    cursor:pointer;

    color:white;

}

.welcomeBox h2{

    color:#38BDF8;

    margin-bottom:20px;

}

.welcomeBox p{

    line-height:1.9;

    margin-bottom:18px;

}

.check{

    margin-top:25px;

}

@media(max-width:600px){

.card{

padding:25px;

}

.logo h1{

font-size:30px;

}

button{

font-size:16px;

}

}

</style>

</head>

<body>

<div id="welcome">

<div class="welcomeBox">

<div class="close" id="closeWelcome">×</div>

<h2>🎵 WakeTuneへようこそ！</h2>

<p>

① MP3を選択します。<br><br>

② アラーム時刻を設定します。<br><br>

③ 「アラーム開始」を押します。<br><br>

④ ページは開いたままご利用ください。<br><br>

🍎 iPhoneではショートカットの
オートメーションを利用すると便利です。

</p>

<label class="check">

<input type="checkbox" id="dontShow">

次回から表示しない

</label>

</div>

</div>

<div class="container">

<div class="card">

<div class="logo">

<h1>🎵 WakeTune</h1>

<p>Wake up with your music.</p>

</div>

<label>

アラーム時刻

</label>

<input type="time" id="alarmTime">

<label>音源（MP3）</label>

<input
type="file"
id="music"
accept=".mp3,audio/*"
hidden>

<button id="selectMusicBtn">
🎵 MP3を選択
</button>

<p id="musicName">
音源が選択されていません
</p>

<div class="buttons">

<button id="startBtn">

アラーム開始

</button>

<button id="stopBtn" disabled>

停止

</button>

</div>

<p id="status">

未設定

</p>

</div>

</div>

<script>

let audio=null;

let alarmHour=0;
let alarmMinute=0;

let played=false;

const status=document.getElementById("status");

const stopBtn=document.getElementById("stopBtn");

const fileInput=document.getElementById("music");

const selectMusicBtn=document.getElementById("selectMusicBtn");

const musicName=document.getElementById("musicName");

const closeWelcome=document.getElementById("closeWelcome");

const welcome=document.getElementById("welcome");

const dontShow=document.getElementById("dontShow");

//==========================
// Welcome画面
//==========================

if(localStorage.getItem("hideWelcome")=="true"){

welcome.style.display="none";

}

closeWelcome.onclick=()=>{

if(dontShow.checked){

localStorage.setItem("hideWelcome","true");

}

welcome.style.display="none";

};

//==========================
// Part1-①ここまで
//==========================
//==========================
// MP3読み込み
//==========================


selectMusicBtn.onclick=()=>{

    fileInput.click();

};

fileInput.addEventListener("change",(e)=>{

    const file=e.target.files[0];

    if(file){

        audio=new Audio(URL.createObjectURL(file));

        musicName.textContent="🎵 "+file.name;

        status.textContent="🟢 音源を読み込みました";

    }

});
//==========================
// アラーム開始
//==========================

document.getElementById("startBtn").onclick=()=>{

    const time=document.getElementById("alarmTime").value;

    if(time===""){

        alert("アラーム時刻を設定してください");

        return;

    }

    if(audio===null){

        alert("MP3を選択してください");

        return;

    }

    const t=time.split(":");

    alarmHour=Number(t[0]);

    alarmMinute=Number(t[1]);

    played=false;

    status.textContent="🟢 アラーム待機中";

    stopBtn.disabled=false;

};

//==========================
// 停止
//==========================

stopBtn.onclick=()=>{

    if(audio){

        audio.pause();

        audio.currentTime=0;

    }

    played=true;

    stopBtn.disabled=true;

    status.textContent="⏹ 停止しました";

};

//==========================
// アラーム判定
//==========================

setInterval(()=>{

    if(audio===null)return;

    const now=new Date();

    if(

        now.getHours()===alarmHour &&

        now.getMinutes()===alarmMinute &&

        !played

    ){

        played=true;

        audio.currentTime=0;

        audio.play();

        status.textContent="🔔 アラームが鳴っています";

    }

},1000);

</script>

</body>

</html>
